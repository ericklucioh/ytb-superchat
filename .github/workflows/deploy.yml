name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.build-id.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Generate Build ID
        id: build-id
        run: echo "version=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./out/
          retention-days: 1

  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ytb-go/go.mod
          cache: true

      - name: Test API
        working-directory: ytb-go
        run: go test ./...

      - name: Build API Binary
        working-directory: ytb-go
        run: mkdir -p bin && go build -o ./bin/ytb-go ./cmd/ytb-go

      - name: Build Docker Image
        run: docker build -f ytb-go/Dockerfile -t ytb-go:${{ github.sha }} .

  deploy:
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./out/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /
          
