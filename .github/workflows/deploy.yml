name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      YTB_APP_ENV: production
      YTB_OVERLAY_API_BASE_URL: ${{ secrets.YTB_OVERLAY_API_BASE_URL }}
    outputs:
      build-version: ${{ steps.build-id.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Generate Build ID
        id: build-id
        run: echo "version=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./out/
          retention-days: 1

  build-api:
    runs-on: ubuntu-latest
    env:
      YTB_APP_ENV: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ytb-go/go.mod
          cache: true

      - name: Test API
        working-directory: ytb-go
        run: go test ./...

      - name: Build API Binary
        working-directory: ytb-go
        run: mkdir -p bin && go build -o ./bin/ytb-go ./cmd/ytb-go

      - name: Build Docker Image
        run: docker build -f ytb-go/Dockerfile -t ytb-go:${{ github.sha }} .

  deploy:
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./out/

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "FTP deploy attempt ${attempt}/3"

            if lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" "${FTP_SERVER}" <<EOF
          set ssl:verify-certificate no
          set ftp:passive-mode true
          mirror -R --only-newer --verbose ./out/ /
          bye
          EOF
            then
              echo "FTP deploy succeeded"
              exit 0
            fi

            if [ "${attempt}" -lt 3 ]; then
              echo "FTP deploy failed, retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
            fi
          done

          echo "FTP deploy failed after 3 attempts"
          exit 1
          
